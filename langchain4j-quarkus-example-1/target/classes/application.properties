# ============================================================
# DEFAULT PROFILE — Ollama (fully local / on-prem)
# ============================================================
# Two model providers are on the classpath (openai + ollama), so we must say which one
# is active. Default = Ollama: nothing leaves the machine. The %openai profile below
# flips both to hosted OpenAI. Models chosen + benchmarked for a fluent CPU-only demo on
# a 4-core ultrabook (see OLLAMA.md). llama3.2:3b generates ~7 tok/s here; keep answers
# short so each response lands in ~10s.
quarkus.langchain4j.chat-model.provider=ollama
quarkus.langchain4j.embedding-model.provider=ollama

quarkus.langchain4j.ollama.base-url=http://localhost:11434
quarkus.langchain4j.ollama.chat-model.model-id=llama3.2:3b
quarkus.langchain4j.ollama.chat-model.temperature=0
# Local inference is slow — give it room so a longer answer doesn't time out.
quarkus.langchain4j.ollama.timeout=180s
quarkus.langchain4j.ollama.log-requests=true
quarkus.langchain4j.ollama.embedding-model.model-id=nomic-embed-text

# The openai extension is still on the classpath; give it a harmless key default so the
# build never fails while Ollama is the active provider. A real key is only needed when
# you run the %openai profile (supply it via the OPENAI_API_KEY env var).
quarkus.langchain4j.openai.api-key=${OPENAI_API_KEY:dummy}

# Location of the newsletter PDFs shared by both the manual ingestion (naive/transformed RAG)
# and the easy-rag extension (declarative RAG).
rag.location=src/main/resources/rag

# Easy RAG (endpoint #3): config-only ingestion + in-memory store, no Java code required.
quarkus.langchain4j.easy-rag.path=src/main/resources/rag
quarkus.langchain4j.easy-rag.max-segment-size=300
quarkus.langchain4j.easy-rag.max-overlap-size=30
quarkus.langchain4j.easy-rag.max-results=3

# Mailer for the @Tool demo (demo04tools) — points at the local SMTP server on :25.
# mock=false so it actually sends (dev mode otherwise just logs the mail and skips SMTP);
# start-tls DISABLED + no auth because it's a plain local test relay. Provider-independent,
# so it lives in the default profile and applies to every profile.
quarkus.mailer.from=mail-triage@brain2.com
quarkus.mailer.host=localhost
quarkus.mailer.port=25
quarkus.mailer.mock=false
quarkus.mailer.start-tls=DISABLED

# ============================================================
# OPENAI PROFILE — hosted OpenAI  (run with: -Dquarkus.profile=openai)
# ============================================================
# Faster and higher quality than local, but data leaves the machine. Needs a real key:
#   PowerShell:  $env:OPENAI_API_KEY = "sk-..."   (then start quarkus:dev)
# The api-key itself is read from OPENAI_API_KEY in the default block above.
%openai.quarkus.langchain4j.chat-model.provider=openai
%openai.quarkus.langchain4j.embedding-model.provider=openai
%openai.quarkus.langchain4j.openai.chat-model.model-name=gpt-4o-mini
%openai.quarkus.langchain4j.openai.chat-model.temperature=0.2
%openai.quarkus.langchain4j.openai.chat-model.log-requests=true
%openai.quarkus.langchain4j.openai.chat-model.log-responses=true
%openai.quarkus.langchain4j.openai.embedding-model.model-name=text-embedding-3-small
