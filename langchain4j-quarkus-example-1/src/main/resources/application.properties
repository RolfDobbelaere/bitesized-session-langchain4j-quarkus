# ============================================================
# DEFAULT PROFILE — OpenAI (hosted)
# ============================================================
# Two model providers are on the classpath (openai + ollama), so we must say
# which one is active. Default = OpenAI; the %ollama profile below flips both.
quarkus.langchain4j.chat-model.provider=openai
quarkus.langchain4j.embedding-model.provider=openai

# Provide your key via env var, never commit a real key here:
#   set OPENAI_API_KEY=sk-... (and restart quarkus:dev)
quarkus.langchain4j.openai.api-key=${OPENAI_API_KEY:dummy}
quarkus.langchain4j.openai.chat-model.model-name=gpt-4o-mini
quarkus.langchain4j.openai.chat-model.temperature=0.2
quarkus.langchain4j.openai.chat-model.log-requests=true
quarkus.langchain4j.openai.chat-model.log-responses=true
quarkus.langchain4j.openai.embedding-model.model-name=text-embedding-3-small

# Location of the newsletter PDFs shared by both the manual ingestion (naive/transformed RAG)
# and the easy-rag extension (declarative RAG).
rag.location=src/main/resources/rag

# Easy RAG (endpoint #3): config-only ingestion + in-memory store, no Java code required.
quarkus.langchain4j.easy-rag.path=src/main/resources/rag
quarkus.langchain4j.easy-rag.max-segment-size=300
quarkus.langchain4j.easy-rag.max-overlap-size=30
quarkus.langchain4j.easy-rag.max-results=3

# ============================================================
# OLLAMA PROFILE — fully local / on-prem  (run with: -Dquarkus.profile=ollama)
# ============================================================
# Nothing leaves the machine. Models chosen + benchmarked for a fluent CPU-only
# demo on a 4-core ultrabook (see OLLAMA.md in the project root). llama3.2:3b
# generates ~7 tok/s here; keep answers short so each response lands in ~10s.
%ollama.quarkus.langchain4j.chat-model.provider=ollama
%ollama.quarkus.langchain4j.embedding-model.provider=ollama

%ollama.quarkus.langchain4j.ollama.base-url=http://localhost:11434
%ollama.quarkus.langchain4j.ollama.chat-model.model-id=llama3.2:3b
%ollama.quarkus.langchain4j.ollama.chat-model.temperature=0
# Local inference is slow — give it room and cap output so the demo stays snappy.
%ollama.quarkus.langchain4j.ollama.timeout=180s
%ollama.quarkus.langchain4j.ollama.log-requests=true
%ollama.quarkus.langchain4j.ollama.embedding-model.model-id=nomic-embed-text
