# Provide your key via env var, never commit a real key here:
#   set OPENAI_API_KEY=sk-... (and restart quarkus:dev)
quarkus.langchain4j.openai.api-key=${OPENAI_API_KEY}
quarkus.langchain4j.openai.chat-model.model-name=gpt-4o-mini
quarkus.langchain4j.openai.chat-model.temperature=0.2
quarkus.langchain4j.openai.chat-model.log-requests=true
quarkus.langchain4j.openai.chat-model.log-responses=true
quarkus.langchain4j.openai.embedding-model.model-name=text-embedding-3-small

# Location of the newsletter PDFs shared by both the manual ingestion (naive/transformed RAG)
# and the easy-rag extension (declarative RAG).
rag.location=src/main/resources/rag

# Easy RAG (endpoint #3): config-only ingestion + in-memory store, no Java code required.
quarkus.langchain4j.easy-rag.path=src/main/resources/rag
quarkus.langchain4j.easy-rag.max-segment-size=300
quarkus.langchain4j.easy-rag.max-overlap-size=30
quarkus.langchain4j.easy-rag.max-results=3
