<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 680" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="sh2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="arr2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#8294AE"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1280" height="680" fill="#0E1726"/>

  <!-- title -->
  <text x="48" y="58" fill="#FFFFFF" font-size="30" font-weight="700">Architecture — the whole thing</text>
  <text x="48" y="88" fill="#8294AE" font-size="16">One JVM. One request path. The observability you already run.</text>

  <!-- TOP ROW -->
  <!-- Browser -->
  <g filter="url(#sh2)"><rect x="48" y="150" width="240" height="110" rx="12" fill="#1E293B" stroke="#CBD5E1" stroke-width="1.5"/></g>
  <text x="72" y="200" fill="#FFFFFF" font-size="18" font-weight="700">Browser / curl</text>
  <text x="72" y="228" fill="#8294AE" font-size="14" font-family="Courier New, monospace">POST /ask/*</text>
  <line x1="288" y1="205" x2="324" y2="205" stroke="#8294AE" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- Quarkus REST -->
  <g filter="url(#sh2)"><rect x="326" y="150" width="250" height="110" rx="12" fill="#1E293B" stroke="#FF4D6A" stroke-width="1.5"/></g>
  <text x="350" y="200" fill="#FFFFFF" font-size="18" font-weight="700">Quarkus REST</text>
  <text x="350" y="228" fill="#8294AE" font-size="14" font-family="Courier New, monospace">JAX-RS resource</text>
  <line x1="576" y1="205" x2="612" y2="205" stroke="#8294AE" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- AiService -->
  <g filter="url(#sh2)"><rect x="614" y="150" width="270" height="110" rx="12" fill="#1E293B" stroke="#34D399" stroke-width="1.5"/></g>
  <text x="638" y="195" fill="#FFFFFF" font-size="18" font-weight="700">LangChain4j AiService</text>
  <text x="638" y="223" fill="#8294AE" font-size="14" font-family="Courier New, monospace">@RegisterAiService</text>

  <!-- AiService -> LLM provider -->
  <line x1="884" y1="205" x2="920" y2="205" stroke="#8294AE" stroke-width="2" marker-end="url(#arr2)"/>
  <g filter="url(#sh2)"><rect x="922" y="150" width="310" height="110" rx="12" fill="#1E293B" stroke="#FF4D6A" stroke-width="1.5"/></g>
  <text x="946" y="195" fill="#FFFFFF" font-size="18" font-weight="700">LLM provider</text>
  <text x="946" y="223" fill="#8294AE" font-size="14" font-family="Courier New, monospace">OpenAI · Azure · Ollama</text>

  <!-- down from AiService to augmentor -->
  <line x1="749" y1="260" x2="749" y2="316" stroke="#8294AE" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- SECOND ROW -->
  <!-- Retrieval augmentor -->
  <g filter="url(#sh2)"><rect x="326" y="320" width="270" height="110" rx="12" fill="#1E293B" stroke="#34D399" stroke-width="1.5"/></g>
  <text x="350" y="365" fill="#FFFFFF" font-size="18" font-weight="700">Retrieval Augmentor</text>
  <text x="350" y="393" fill="#8294AE" font-size="14" font-family="Courier New, monospace">retrieve + inject</text>
  <!-- augmentor connects up to AiService (left feed) -->
  <line x1="614" y1="375" x2="600" y2="375" stroke="#8294AE" stroke-width="2"/>
  <line x1="614" y1="375" x2="614" y2="260" stroke="#8294AE" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- augmentor -> embedding store -->
  <line x1="596" y1="375" x2="632" y2="375" stroke="#8294AE" stroke-width="2" marker-end="url(#arr2)"/>
  <g filter="url(#sh2)"><rect x="634" y="320" width="300" height="110" rx="12" fill="#1E293B" stroke="#FBBF24" stroke-width="1.5"/></g>
  <text x="658" y="365" fill="#FFFFFF" font-size="18" font-weight="700">Embedding store</text>
  <text x="658" y="393" fill="#8294AE" font-size="14" font-family="Courier New, monospace">in-memory · pgvector</text>

  <!-- PDFs feed store -->
  <line x1="972" y1="375" x2="936" y2="375" stroke="#8294AE" stroke-width="2" marker-end="url(#arr2)"/>
  <g filter="url(#sh2)"><rect x="974" y="320" width="258" height="110" rx="12" fill="#1E293B" stroke="#CBD5E1" stroke-width="1.5"/></g>
  <text x="998" y="365" fill="#FFFFFF" font-size="18" font-weight="700">Newsletter PDFs</text>
  <text x="998" y="393" fill="#8294AE" font-size="13" font-family="Courier New, monospace">src/main/resources/rag</text>

  <!-- OBSERVABILITY STRIP -->
  <g filter="url(#sh2)"><rect x="48" y="486" width="1184" height="96" rx="12" fill="#16202F" stroke="#2B3A52"/></g>
  <!-- simple chart glyph -->
  <g stroke="#34D399" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="86,556 104,540 122,548 140,520"/>
  </g>
  <line x1="80" y1="560" x2="146" y2="560" stroke="#34D399" stroke-width="3" stroke-linecap="round"/>
  <line x1="80" y1="560" x2="80" y2="516" stroke="#34D399" stroke-width="3" stroke-linecap="round"/>
  <text x="180" y="525" fill="#FFFFFF" font-size="17" font-weight="700">Wrapped by the JVM, watched by your Elastic APM agent.</text>
  <text x="180" y="552" fill="#8294AE" font-size="15">Every box above is a traced span — no new observability stack required. (Native image → OpenTelemetry over OTLP.)</text>

  <!-- footer -->
  <text x="48" y="640" fill="#2B3A52" font-size="13" font-family="Courier New, monospace">RAG, Four Ways · Quarkus + LangChain4j</text>
</svg>
