<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 560" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#8294AE"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1280" height="560" fill="#0E1726"/>

  <!-- title -->
  <text x="48" y="58" fill="#FFFFFF" font-size="30" font-weight="700">How RAG works</text>
  <text x="48" y="88" fill="#8294AE" font-size="16">Ingest once at startup, then retrieve on every question.</text>

  <!-- phase labels -->
  <text x="48" y="138" fill="#FBBF24" font-size="14" font-weight="700" letter-spacing="2" font-family="Courier New, monospace">INGESTION · AT STARTUP</text>
  <text x="664" y="138" fill="#34D399" font-size="14" font-weight="700" letter-spacing="2" font-family="Courier New, monospace">QUERY · PER REQUEST</text>

  <!-- dashed divider between phases -->
  <line x1="624" y1="120" x2="624" y2="430" stroke="#2B3A52" stroke-width="1.5" stroke-dasharray="5 6"/>

  <!-- step card helper geometry: 268 wide, 150 tall -->
  <!-- STEP 1 -->
  <g filter="url(#sh)">
    <rect x="48" y="158" width="268" height="150" rx="12" fill="#1E293B" stroke="#2B3A52"/>
  </g>
  <circle cx="86" cy="196" r="20" fill="#FBBF24"/>
  <text x="86" y="203" fill="#0E1726" font-size="20" font-weight="700" text-anchor="middle">1</text>
  <text x="120" y="202" fill="#FFFFFF" font-size="17" font-weight="700">Split &amp; embed</text>
  <text x="72" y="240" fill="#8294AE" font-size="13.5">Chop documents into chunks;</text>
  <text x="72" y="261" fill="#8294AE" font-size="13.5">turn each chunk into a vector</text>
  <text x="72" y="282" fill="#8294AE" font-size="13.5">with an embedding model.</text>

  <!-- arrow 1->2 -->
  <line x1="316" y1="233" x2="344" y2="233" stroke="#8294AE" stroke-width="2" marker-end="url(#arr)"/>

  <!-- STEP 2 -->
  <g filter="url(#sh)">
    <rect x="346" y="158" width="268" height="150" rx="12" fill="#1E293B" stroke="#2B3A52"/>
  </g>
  <circle cx="384" cy="196" r="20" fill="#FBBF24"/>
  <text x="384" y="203" fill="#0E1726" font-size="20" font-weight="700" text-anchor="middle">2</text>
  <text x="418" y="202" fill="#FFFFFF" font-size="17" font-weight="700">Store</text>
  <text x="370" y="240" fill="#8294AE" font-size="13.5">Keep the vectors in an</text>
  <text x="370" y="261" fill="#8294AE" font-size="13.5">embedding store — in-memory</text>
  <text x="370" y="282" fill="#8294AE" font-size="13.5">for demo, pgvector in prod.</text>

  <!-- arrow 2->3 across the phase divider -->
  <line x1="614" y1="233" x2="662" y2="233" stroke="#8294AE" stroke-width="2" marker-end="url(#arr)"/>

  <!-- STEP 3 -->
  <g filter="url(#sh)">
    <rect x="664" y="158" width="268" height="150" rx="12" fill="#1E293B" stroke="#2B3A52"/>
  </g>
  <circle cx="702" cy="196" r="20" fill="#34D399"/>
  <text x="702" y="203" fill="#0E1726" font-size="20" font-weight="700" text-anchor="middle">3</text>
  <text x="736" y="202" fill="#FFFFFF" font-size="17" font-weight="700">Embed the question</text>
  <text x="688" y="240" fill="#8294AE" font-size="13.5">The user's question goes</text>
  <text x="688" y="261" fill="#8294AE" font-size="13.5">through the same embedding</text>
  <text x="688" y="282" fill="#8294AE" font-size="13.5">model, producing a vector.</text>

  <!-- arrow 3->4 -->
  <line x1="932" y1="233" x2="960" y2="233" stroke="#8294AE" stroke-width="2" marker-end="url(#arr)"/>

  <!-- STEP 4 -->
  <g filter="url(#sh)">
    <rect x="962" y="158" width="270" height="150" rx="12" fill="#1E293B" stroke="#2B3A52"/>
  </g>
  <circle cx="1000" cy="196" r="20" fill="#34D399"/>
  <text x="1000" y="203" fill="#0E1726" font-size="20" font-weight="700" text-anchor="middle">4</text>
  <text x="1034" y="202" fill="#FFFFFF" font-size="17" font-weight="700">Similarity search</text>
  <text x="986" y="240" fill="#8294AE" font-size="13.5">Find the nearest chunks in</text>
  <text x="986" y="261" fill="#8294AE" font-size="13.5">vector space — semantic</text>
  <text x="986" y="282" fill="#8294AE" font-size="13.5">match, not keyword match.</text>

  <!-- STEP 5 full width result bar -->
  <g filter="url(#sh)">
    <rect x="48" y="360" width="1184" height="120" rx="12" fill="#16202F" stroke="#34D399" stroke-width="1.5"/>
  </g>
  <circle cx="92" cy="420" r="22" fill="#34D399"/>
  <text x="92" y="428" fill="#0E1726" font-size="22" font-weight="700" text-anchor="middle">5</text>
  <text x="132" y="408" fill="#FFFFFF" font-size="19" font-weight="700">Inject + generate</text>
  <text x="132" y="438" fill="#CBD5E1" font-size="15">The retrieved chunks are pasted into the prompt alongside the question, and the model answers</text>
  <text x="132" y="461" fill="#CBD5E1" font-size="15">from them — citing your data instead of inventing it. Same model, grounded output.</text>

  <!-- footer -->
  <text x="48" y="528" fill="#2B3A52" font-size="13" font-family="Courier New, monospace">RAG, Four Ways · Quarkus + LangChain4j</text>
</svg>
